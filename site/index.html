<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cppmanlite — C++ Documentation Search</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>
</head>
<body>
  <header>
    <h1>cppmanlite</h1>
    <p class="subtitle">Lightweight C++ documentation search — powered by cppreference.com</p>
  </header>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search C++ docs (e.g. vector, std::sort, shared_ptr)…" autofocus>
    <span id="result-count"></span>
  </div>

  <div id="results"></div>
  <div id="reader" style="display:none">
    <button id="back-btn">← Back to search</button>
    <div id="reader-content"></div>
  </div>

  <footer>
    <p>Documentation from <a href="https://en.cppreference.com" target="_blank">cppreference.com</a> (CC-BY-SA / GFDL). Index updated monthly via GitHub Actions.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
