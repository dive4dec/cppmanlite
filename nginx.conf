server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|json)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Docs: cache longer (they only change on rebuild)
    location /cppmanlite/docs/ {
        expires 24h;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA fallback
    location /cppmanlite/ {
        try_files $uri $uri/ /cppmanlite/index.html;
    }
}
