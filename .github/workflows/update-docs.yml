name: Update docs and deploy

on:
  schedule:
    # First day of each month at 09:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Download cppreference archive
        run: |
          VERSION="v$(date +%Y%m%d)"
          # Try latest, fall back to known good version
          URL="https://github.com/PeterFeicht/cppreference-doc/releases/download/${VERSION}/html-book-$(echo ${VERSION} | sed 's/v//').tar.xz"
          FALLBACK="https://github.com/PeterFeicht/cppreference-doc/releases/download/v20250209/html-book-20250209.tar.xz"
          curl -sL "$URL" -o cppref.tar.xz || curl -sL "$FALLBACK" -o cppref.tar.xz
          mkdir -p extract
          tar xf cppref.tar.xz -C extract

      - name: Build search index
        run: |
          pip install -e .
          python3 scripts/build_index.py extract/reference/en site_output
          cp site_output/index.json cppmanlite/data/index.json

      - name: Build static site for GitHub Pages
        run: |
          mkdir -p gh-pages
          cp site/index.html site/style.css site/app.js gh-pages/
          cp site_output/index.json gh-pages/
          # Docs go to gh-pages/docs/ for local page loading
          cp -r site_output/docs gh-pages/docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cppmanlite/data/index.json
          git diff --staged --quiet || git commit -m "chore: update search index [skip ci]"
          git push
